schema_version: '1.0'
id: de-lo-support-001
pair_id: lo-support-001
title: Verspätungs-Ticket klassifizieren
language: de-DE
category: customer_service
task_type: support_routing
difficulty: easy
risk: medium
review_status: approved
data_classification: synthetic
tags:
- logistics
- support
- shipping
messages:
- role: system
  content: "Klassifiziere das Support-Ticket. Gib JSON mit category (eines von [billing,shipping,technical,other]) und priority (eines von [low,medium,high,urgent]) zurück. Prioritätsrubrik: urgent = geschäftskritischer Ausfall, Sicherheitsvorfall oder Same-Day-/rechtliche Frist; high = erheblicher finanzieller oder prozessblockierender Impact mit Handlungsbedarf innerhalb von Tagen; medium = begrenzter Impact, keine enge Frist; low = geringfügig, kosmetisch oder informativ."
- role: user
  fixture: fixtures/de-delay-ticket.txt
generation:
  max_tokens: 120
  temperature: 0
  response_format: json
expected:
  category: shipping
  priority: urgent
scorers:
- type: json_schema
  weight: 0.2
  params:
    schema: schemas/support-routing.schema.json
- type: classification
  weight: 0.5
  params:
    field: category
    expected: shipping
    allowed:
      - billing
      - shipping
      - technical
      - other
- type: classification
  weight: 0.3
  params:
    field: priority
    expected: urgent
    allowed:
      - low
      - medium
      - high
      - urgent
    scale:
      - low
      - medium
      - high
      - urgent
    adjacent_credit: 0.5
pass_threshold: 0.85
