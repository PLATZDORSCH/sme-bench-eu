schema_version: "1.0"
review_status: draft
data_classification: synthetic
id: en-demo-support-001
pair_id: demo-support-001
title: Demo classify billing ticket
language: en-GB
category: customer_service
task_type: support_routing
difficulty: normal
risk: medium
tags:
  - demo
  - support
messages:
  - role: system
    content: >-
      Classify the support ticket. Return JSON with category (one of
      [billing,shipping,technical,other]) and priority (one of
      [low,medium,high,urgent]). Priority guide: urgent = business-critical outage,
      security incident, or same-day/legal deadline; high = significant financial or
      process-blocking impact needing action within days; medium = limited impact, no
      tight deadline; low = minor, cosmetic, or informational. Reply with JSON only,
      no chain-of-thought.
  - role: user
    fixture: fixtures/en-billing-ticket.txt
generation:
  max_tokens: 120
  temperature: 0
  response_format: json
expected:
  category: billing
  priority: high
scorers:
  - type: json_schema
    weight: 0.2
    params:
      schema: schemas/support-routing.schema.json
  - type: classification
    weight: 0.5
    params:
      field: category
      expected: billing
      allowed:
        - billing
        - shipping
        - technical
        - other
  - type: classification
    weight: 0.3
    params:
      field: priority
      expected: high
      allowed:
        - low
        - medium
        - high
        - urgent
      scale:
        - low
        - medium
        - high
        - urgent
      adjacent_credit: 0.5
pass_threshold: 0.85
